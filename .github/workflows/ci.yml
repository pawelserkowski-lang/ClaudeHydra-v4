name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install biome
        run: npm install --no-save @biomejs/biome
      - name: Biome check
        run: npx biome check --diagnostic-level=error src/
      # tsc requires @jaskier/ui workspace package (parent Desktop workspace)
      # TypeScript is enforced locally via pre-commit hook (conditional tsc)

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo check
      - run: cargo test --no-run
