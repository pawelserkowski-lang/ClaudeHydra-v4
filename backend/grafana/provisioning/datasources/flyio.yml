apiVersion: 1

datasources:
  - name: Fly.io Prometheus
    type: prometheus
    access: proxy
    url: https://api.fly.io/prometheus/personal/
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: "${FLY_METRICS_TOKEN}"
