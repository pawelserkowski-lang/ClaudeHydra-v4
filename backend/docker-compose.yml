name: claudehydra

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: claudehydra
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: claude_local
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d claudehydra"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://claude:claude_local@db:5432/claudehydra
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: "8082"
    depends_on:
      db:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: jaskier
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      FLY_METRICS_TOKEN: "${FLY_METRICS_TOKEN}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  grafana-data:
